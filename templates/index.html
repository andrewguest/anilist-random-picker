<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniList Random Picker</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .search-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .htmx-request .submit-btn {
            opacity: 0.7;
            cursor: wait;
        }
        
        .anime-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .anime-header {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .anime-cover {
            width: 150px;
            height: 210px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .anime-info h2 {
            color: #333;
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        
        .alt-title {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 5px;
        }
        
        .anime-details {
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
            margin-bottom: 20px;
        }
        
        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-row .label {
            font-weight: 600;
            min-width: 150px;
            color: #555;
        }
        
        .detail-row span:last-child {
            color: #333;
        }
        
        .anime-footer {
            text-align: center;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }
        
        .anilist-link {
            display: inline-block;
            padding: 12px 30px;
            background: #02A9FF;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
        }
        
        .anilist-link:hover {
            background: #0288d1;
            transform: translateY(-2px);
        }
        
        .error {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            color: #856404;
            animation: fadeIn 0.5s ease-in;
        }
        
        .error p {
            margin: 5px 0;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        
        @media (max-width: 600px) {
            .anime-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .detail-row {
                flex-direction: column;
                gap: 5px;
            }
            
            .detail-row .label {
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 AniList Random Picker</h1>
            <p>Pick a random anime from your list!</p>
        </div>
        
        <div class="search-card">
            <form hx-post="/random" hx-target="#result" hx-swap="innerHTML">
                <div class="form-group">
                    <label for="username">AniList Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="status">List Status</label>
                    <select id="status" name="status" required>
                        <option value="PLANNING">Planning to Watch</option>
                        <option value="CURRENT">Currently Watching</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="PAUSED">Paused</option>
                        <option value="DROPPED">Dropped</option>
                        <option value="REPEATING">Rewatching</option>
                    </select>
                </div>
                
                <button type="submit" class="submit-btn">
                    🎲 Pick Random Anime
                </button>
            </form>
        </div>
        
        <div id="result">
            <!-- Results will appear here -->
        </div>
    </div>
</body>
</html>
